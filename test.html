<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الأزرار - ComptaPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { margin: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🧪 اختبار الأزرار - ComptaPro</h1>
        
        <div class="test-section">
            <h3>🔘 اختبار الأزرار الأساسية</h3>
            <button class="btn btn-primary" onclick="showAddCustomerModal()">
                <i class="fas fa-user-plus"></i> إضافة عميل
            </button>
            <button class="btn btn-success" onclick="showCreateInvoiceModal()">
                <i class="fas fa-file-invoice"></i> إنشاء فاتورة
            </button>
            <button class="btn btn-warning" onclick="generateRandomInvoice()">
                <i class="fas fa-magic"></i> فاتورة تلقائية
            </button>
            <button class="btn btn-info" onclick="showAddProductModal()">
                <i class="fas fa-box"></i> إضافة منتج
            </button>
        </div>
        
        <div class="test-section">
            <h3>📊 اختبار الدوال</h3>
            <button class="btn btn-secondary" onclick="testFunction('showAddCustomerModal')">
                اختبار دالة العميل
            </button>
            <button class="btn btn-secondary" onclick="testFunction('generateRandomInvoice')">
                اختبار دالة الفاتورة
            </button>
            <button class="btn btn-secondary" onclick="checkBootstrap()">
                فحص Bootstrap
            </button>
        </div>
        
        <div class="test-section">
            <h3>📝 نتائج الاختبار</h3>
            <div id="testResults" class="alert alert-info">
                اضغط على الأزرار أعلاه لاختبار الوظائف...
            </div>
        </div>
        
        <div class="test-section">
            <h3>🔍 وحدة التحكم</h3>
            <p>افتح وحدة التحكم (F12) لمشاهدة الرسائل التفصيلية</p>
            <button class="btn btn-dark" onclick="console.log('🧪 اختبار وحدة التحكم')">
                اختبار وحدة التحكم
            </button>
        </div>
    </div>

    <!-- Modals (simplified) -->
    <div class="modal fade" id="addCustomerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">إضافة عميل جديد</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCustomerForm">
                        <div class="mb-3">
                            <label class="form-label">اسم العميل *</label>
                            <input type="text" class="form-control" id="customerName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رقم ICE</label>
                            <input type="text" class="form-control" id="customerICE" maxlength="15">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="tel" class="form-control" id="customerPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">العنوان</label>
                            <textarea class="form-control" id="customerAddress" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="addCustomer()">حفظ العميل</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createInvoiceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">إنشاء فاتورة جديدة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>نموذج إنشاء الفاتورة...</p>
                    <select class="form-control" id="invoiceCustomer">
                        <option value="">اختر العميل...</option>
                        <option value="new">+ إضافة عميل جديد</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary">إنشاء الفاتورة</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Test functions
        function testFunction(funcName) {
            const results = document.getElementById('testResults');
            try {
                if (typeof window[funcName] === 'function') {
                    results.innerHTML = `✅ الدالة ${funcName} موجودة ومتاحة`;
                    results.className = 'alert alert-success';
                } else {
                    results.innerHTML = `❌ الدالة ${funcName} غير موجودة`;
                    results.className = 'alert alert-danger';
                }
            } catch (error) {
                results.innerHTML = `❌ خطأ في اختبار ${funcName}: ${error.message}`;
                results.className = 'alert alert-danger';
            }
        }
        
        function checkBootstrap() {
            const results = document.getElementById('testResults');
            if (typeof bootstrap !== 'undefined') {
                results.innerHTML = '✅ Bootstrap محمل بنجاح';
                results.className = 'alert alert-success';
            } else {
                results.innerHTML = '❌ Bootstrap غير محمل';
                results.className = 'alert alert-danger';
            }
        }
        
        // Simple test functions
        function showAddCustomerModal() {
            console.log('🔘 اختبار: فتح نموذج العميل');
            if (typeof bootstrap !== 'undefined') {
                const modal = new bootstrap.Modal(document.getElementById('addCustomerModal'));
                modal.show();
                document.getElementById('testResults').innerHTML = '✅ تم فتح نموذج العميل بنجاح';
                document.getElementById('testResults').className = 'alert alert-success';
            } else {
                alert('Bootstrap غير محمل');
            }
        }
        
        function showCreateInvoiceModal() {
            console.log('🔘 اختبار: فتح نموذج الفاتورة');
            if (typeof bootstrap !== 'undefined') {
                const modal = new bootstrap.Modal(document.getElementById('createInvoiceModal'));
                modal.show();
                document.getElementById('testResults').innerHTML = '✅ تم فتح نموذج الفاتورة بنجاح';
                document.getElementById('testResults').className = 'alert alert-success';
            } else {
                alert('Bootstrap غير محمل');
            }
        }
        
        function generateRandomInvoice() {
            console.log('🔘 اختبار: إنشاء فاتورة تلقائية');
            alert('تم اختبار دالة الفاتورة التلقائية بنجاح!');
            document.getElementById('testResults').innerHTML = '✅ تم اختبار الفاتورة التلقائية';
            document.getElementById('testResults').className = 'alert alert-success';
        }
        
        function showAddProductModal() {
            console.log('🔘 اختبار: فتح نموذج المنتج');
            alert('ميزة إضافة المنتجات قيد التطوير');
            document.getElementById('testResults').innerHTML = '✅ تم اختبار نموذج المنتج';
            document.getElementById('testResults').className = 'alert alert-success';
        }
        
        function addCustomer() {
            console.log('🔘 اختبار: حفظ عميل');
            alert('تم اختبار حفظ العميل بنجاح!');
        }
        
        console.log('✅ صفحة الاختبار جاهزة');
    </script>
</body>
</html>
